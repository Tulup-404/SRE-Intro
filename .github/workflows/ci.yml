name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Bonus: skip runs triggered by CI's own tag-update commits to avoid an infinite loop
    if: "!startsWith(github.event.head_commit.message, 'ci:')"
    permissions:
      contents: write       # Needed to commit updated manifests back (bonus)
      packages: write       # Needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway
        run: |
          docker build -t ghcr.io/tulup-404/quickticket-gateway:${{ github.sha }} ./app/gateway
          docker push ghcr.io/tulup-404/quickticket-gateway:${{ github.sha }}

      - name: Build and push events
        run: |
          docker build -t ghcr.io/tulup-404/quickticket-events:${{ github.sha }} ./app/events
          docker push ghcr.io/tulup-404/quickticket-events:${{ github.sha }}

      - name: Build and push payments
        run: |
          docker build -t ghcr.io/tulup-404/quickticket-payments:${{ github.sha }} ./app/payments
          docker push ghcr.io/tulup-404/quickticket-payments:${{ github.sha }}

      # ---- Bonus: automatically update image tags in K8s manifests ----
      - name: Update image tags in manifests
        run: |
          SHA=${{ github.sha }}
          sed -i "s|image: ghcr.io/.*/quickticket-gateway:.*|image: ghcr.io/tulup-404/quickticket-gateway:${SHA}|" k8s/gateway.yaml
          sed -i "s|image: ghcr.io/.*/quickticket-events:.*|image: ghcr.io/tulup-404/quickticket-events:${SHA}|" k8s/events.yaml
          sed -i "s|image: ghcr.io/.*/quickticket-payments:.*|image: ghcr.io/tulup-404/quickticket-payments:${SHA}|" k8s/payments.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/
          git diff --cached --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
