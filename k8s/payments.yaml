apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  labels:
    app: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments
  template:
    metadata:
      labels:
        app: payments
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: payments
          image: ghcr.io/tulup-404/quickticket-payments:ec1eff1f8f289b277f31d8c3fef3bf5aad83da6d
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: PAYMENT_FAILURE_RATE
              value: "0.0"
            - name: PAYMENT_LATENCY_MS
              value: "0"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            periodSeconds: 5
            failureThreshold: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payments
spec:
  selector:
    app: payments
  ports:
    - port: 8082
      targetPort: 8082